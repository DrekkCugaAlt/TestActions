name: "Detect PR Approval"

on:
  pull_request_review:
    types: [submitted]

jobs:
  detect:
    # Only run if it's an explicit approval AND the PR is from a fork
    if: github.event.review.state == 'approved' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Save PR context
        run: |
          mkdir -p ./pr
          echo "${{ github.event.pull_request.number }}" > ./pr/NR
      
      - name: Upload PR number
        uses: actions/upload-artifact@v4
        with:
          name: pr-approval-${{ github.event.pull_request.number }}
          path: pr/
          retention-days: 1 # Minimal retention just in case